<section class="hero-section">
  <div class="hero-content">
    <a [routerLink]="['/', currentLang]" class="brand-link">
      <span class="brand-title">{{ 'HEADER.BRAND_TITLE' | translate }}</span>
    </a>

    <h1 class="hero-headline">{{ 'HOME.HERO.HEADLINE' | translate }}</h1>
    <p class="hero-subheadline">{{ 'HOME.HERO.SUBHEADLINE' | translate }}</p>
    <button class="cta-button" [routerLink]="['/', currentLang, 'projects']">
      {{ 'HOME.HERO.CTA_BUTTON' | translate }}
    </button>
  </div>
</section>
