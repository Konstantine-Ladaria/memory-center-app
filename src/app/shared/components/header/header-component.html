<div class="upper-header">
  @if (parentOrg$ | async; as parentOrg) {
    <a
      [href]="parentOrg.websiteUrl"
      target="_blank"
      rel="noopener"
      class="parent-brand-link"
      [title]="parentOrg.title[$any(currentLang)]"
    >
      <img
        [src]="
          themeService.isDarkMode() && parentOrg.logoDarkUrl
            ? parentOrg.logoDarkUrl
            : parentOrg.logoUrl
        "
        [alt]="'HEADER.PARENT_BRAND' | translate"
        class="parent-logo"
      />
      <span class="parent-title">{{ parentOrg.title[$any(currentLang)] }}</span>
    </a>
  }
</div>

<header class="lower-header" [class.hidden]="isHidden" [class.at-top]="isAtTop">
  <div class="header-left">
    <a routerLink="/" class="brand-logo-link" aria-label="Home">
      <img
        [src]="
          themeService.isDarkMode()
            ? 'assets/images/brand/center-logo-light.png'
            : 'assets/images/brand/center-logo-dark.png'
        "
        [alt]="'HEADER.BRAND_TITLE' | translate"
        class="brand-logo"
      />
      <span class="brand-title">{{ 'HEADER.BRAND_TITLE' | translate }}</span>
    </a>
  </div>

  <div class="header-right">
    <app-language-switcher style="z-index: 9999"></app-language-switcher>

    <button (click)="themeService.toggleTheme()" class="theme-toggle-btn" aria-label="Toggle theme">
      <span class="material-symbols-outlined">
        {{ themeService.isDarkMode() ? 'light_mode' : 'dark_mode' }}
      </span>
    </button>

    <app-hamburger-menu></app-hamburger-menu>
  </div>
</header>
